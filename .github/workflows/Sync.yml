name: Sync

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  Sync-and-Copy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Sync upstream -> master
      - name: Sync Upstream to Master
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Backup Sync.yml
          mkdir -p /tmp/workflows
          cp .github/workflows/Sync.yml /tmp/workflows/Sync.yml

          # Fetch upstream
          git remote add upstream https://github.com/Centralmatrix3/Matrix-io.git
          git fetch upstream master

          # Reset local master to match upstream/master
          git checkout -B master upstream/master

          # Remove .github/workflows to prevent permission errors
          rm -rf .github/workflows

          # Restore Sync.yml
          mkdir -p .github/workflows
          cp /tmp/workflows/Sync.yml .github/workflows/Sync.yml

          # Commit the removal and restoration if there are changes
          git add .github/workflows/Sync.yml
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Sync from upstream (excluding workflows, keeping Sync.yml)"
          fi

          # Force push to origin/master
          git push -f origin master

      # 3. Sync selected files from master to main
      - name: Copy Shadowrocket rules from master to main
        run: |
          set -e

          FILES=(
            ChinaMedia.list
            Unbreak.list
            AdBlock.list
            Steam.list
            SteamCN.list
            Global.list
            Apple.list
            LAN.list
            GEOIPCN.list
            DIRECT.list
          )

          # Ensure main branch exists locally
          git fetch origin main || true

          # Create worktree for main branch
          git worktree add /tmp/main main || git worktree add /tmp/main -b main

          for file in "${FILES[@]}"; do
            src="Shadowrocket/Ruleset/$file"
            dst="/tmp/main/Shadowrocket/Ruleset/$file"

            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
            else
              echo "Warning: $src not found in master"
            fi
          done

          # Commit to main only if changed
          cd /tmp/main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Shadowrocket/Ruleset
          git diff --cached --quiet || git commit -m "Sync Shadowrocket rules from master"
          git push origin main
