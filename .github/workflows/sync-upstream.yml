name: Sync master and copy rules to main

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  sync-and-copy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Sync upstream -> master
      - name: Sync upstream to master
        uses: repo-sync/github-sync@v2
        with:
          source_repo: https://github.com/Centralmatrix3/Matrix-io.git
          source_branch: master
          destination_branch: master
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Copy selected files from master to main
      - name: Copy Shadowrocket rules from master to main
        run: |
          set -e

          FILES=(
            ChinaMedia.list
            Unbreak.list
            AdBlock.list
            Steam.list
            SteamCN.list
            Global.list
            Apple.list
            LAN.list
            GEOIPCN.list
          )

          # Ensure main branch exists locally
          git fetch origin main || true

          # Create worktree for main branch
          git worktree add /tmp/main main || git worktree add /tmp/main -b main

          for file in "${FILES[@]}"; do
            src="Shadowrocket/Ruleset/$file"
            dst="/tmp/main/Shadowrocket/Ruleset/$file"

            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
            else
              echo "Warning: $src not found in master"
            fi
          done

          # Commit to main only if changed
          cd /tmp/main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Shadowrocket/Ruleset
          git diff --cached --quiet || git commit -m "Sync Shadowrocket rules from master"
          git push origin main
